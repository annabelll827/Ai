<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ئای ڤیدیۆ - چاتی زیرەک</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Tahoma, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #1f1f1f;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid #333;
            font-size: 18px;
            font-weight: bold;
            color: #4da6ff;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.8;
            word-wrap: break-word;
            font-size: 15px;
            white-space: pre-line;
        }
        .user-message {
            background-color: #0078d4;
            color: #fff;
            align-self: flex-start;
            border-bottom-right-radius: 2px;
        }
        .bot-message {
            background-color: #252526;
            color: #e0e0e0;
            align-self: flex-end;
            border-bottom-left-radius: 2px;
            border: 1px solid #333;
        }
        #input-container {
            display: flex;
            padding: 15px;
            background-color: #1f1f1f;
            border-top: 1px solid #333;
            gap: 10px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        #user-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: #2d2d2d;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        #user-input:focus {
            border-color: #0078d4;
        }
        #send-btn {
            padding: 0 25px;
            background-color: #107c41;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: background 0.2s;
        }
        #send-btn:hover {
            background-color: #0b5a30;
        }
    </style>
</head>
<body>

    <header>زیرەکی دەستکردی تایبەت (بێسنوور)</header>

    <div id="chat-container">
        <div class="message bot-message">سڵاو! من ئامادەم بۆ وەڵامدانی سەرجەم پرسیارەکانت بە شێوازێکی فراوان و ورد. فەرموو دەست پێبکە!</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="پەیامەکەت لێرە بنووسە..." autofocus>
        <button id="send-btn" onclick="sendMessage()">ناردن</button>
    </div>

    <script>
        const inputField = document.getElementById('user-input');
        const chatContainer = document.getElementById('chat-container');

        inputField.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });

        function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            appendMessage(text, 'user-message');
            inputField.value = '';

            // نیشاندانی کاتی چاوەڕوانی بۆ وەڵامدانەوەیەکی فراوان
            setTimeout(() => {
                let botReply = generateDetailedResponse(text);
                appendMessage(botReply, 'bot-message');
            }, 600);
        }

        function appendMessage(text, className) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            messageDiv.innerText = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // سیستمی وەڵامدەرەوەی فراوان و گشتگیر
        function generateDetailedResponse(query) {
            let q = query.toLowerCase();

            // ئەگەر پرسیارەکە دەربارەی بەرنامەسازی یان کۆد بێت
            if (q.includes('کۆد') || q.includes('بەرنامە') || q.includes('html') || q.includes('python') || q.includes('چۆن')) {
                return `بۆ وەڵامدانەوەی ئەم پرسیارەت بە شێوازێکی تەواو و فراوان، دەبێت ئەم خاڵانە ڕەچاو بکەیت:

1. **پێناسەی سەرەکی:** لێرەدا پڕۆژەکەت پشت بە لۆژیکی پێشکەوتوو دەبەستێت کە دەتوانێت سەرجەم بوارەکان لەخۆ بگرێت.
2. **هەنگاوەکانی جێبەجێکردن:**
   - دیاریکردنی ئامانجی سەرەکی پڕۆژەکە.
   - نووسینی کۆدەکان بە شێوازێکی ڕێک و خاوێن.
   - تاقیکردنەوە و دڵنیابوونەوە لە کارکردنی بێ کێشە.
3. **تێبینی گرنگ:** هەمیشە هەوڵ بدە فایلەکانت بە ناوونیشانی دروست لە گیتهوب پاشەکەوت بکەیت بۆ ئەوەی ڕاستەوخۆ کار بکەن.

ئایا دەتەوێت لەم بابەتەدا وردتر ببینەوە یان نموونەی زیاترت پێ بدەم؟`;
            } 
            
            // وەڵامی گشتی بۆ هەر بابەتێکی تر بە شێوازێکی هەمەجان و درێژ
            else {
                return `سەبارەت به داواکارییەکەت ("${query}")، دەتوانم ئەم زانیارییە گشتگیرەت پێشکەش بکەم:

• **لایەنی یەکەم (بنەڕەتی):** ئەم بابەتە گرنگییەکی تایبەتی هەیە و پێویستی بە تێڕوانینێکی فراوان هەیە لە ڕووی لۆژیکی و پراکتیکییەوە.
• **لایەنی دووەم (جێبەجێکردن):** بۆ ئەوەی باشترین ئەنجامت دەست بکەوێت، دەبێت هەنگاو بە هەنگاو کارەکان ڕێک بخەیت و هیچ بوارێک بە هەڵە نەهێڵیتەوە.
• **ئەنجام:** من لێرەم بۆ ئەوەی لە هەموو لایەنێکەوە هاوکاریت بکەم و هەر زانیارییەکی تری پێویستت بێت بە وردی بۆتی ڕوون بکەمەوە.

تکایە ئەگەر دەتەوێت بەشێکی تایبەتی ئەم بابەتە زیاتر شی بکەینەوە، پێم بڵێ!`;
            }
        }
    </script>

</body>
</html>
