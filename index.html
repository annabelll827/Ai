<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یاریدەدەری زیرەکی دەستکرد</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #chat-container {
            width: 100%;
            max-width: 650px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 85vh;
            overflow: hidden;
        }
        .chat-header {
            background: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f8f9fa;
        }
        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 14px;
            line-height: 1.6;
            font-size: 15px;
            word-wrap: break-word;
        }
        .user-msg {
            background-color: #007bff;
            color: white;
            align-self: flex-start;
            border-bottom-right-radius: 4px;
        }
        .ai-msg {
            background-color: #e4e6eb;
            color: #1c1e21;
            align-self: flex-end;
            border-bottom-left-radius: 4px;
        }
        #input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #e1e4e8;
            background: #ffffff;
        }
        #user-input {
            flex: 1;
            padding: 14px;
            border: 1px solid #ccd0d5;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
        }
        #user-input:focus { border-color: #007bff; }
        #send-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 0 25px;
            margin-right: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
        }
        #send-btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="chat-header">یاریدەدەری زیرەکی دەستکرد</div>
        <div id="chat-box">
            <div class="message ai-msg">سڵاو! من زیرەکی دەستکردم. چۆن دەتوانم یارمەتیت بدەم؟</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="پرسیارەکەت لێرە بنووسە..." autofocus>
            <button id="send-btn" onclick="sendMessage()">ناردن</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyAz-YOUR_WORKING_API_KEY_HERE"; 
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-msg');
            userInput.value = '';
            sendBtn.disabled = true;

            const loadingMsg = appendMessage('بیردەکاتەوە...', 'ai-msg');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [
                            {
                                parts: [
                                    { text: "تۆ زیرەکی دەستکردی منی، بە زمانی کوردی شیرین و ڕاستەوخۆ وەڵامی ئەمە بدەرەوە: " + text }
                                ]
                            }
                        ]
                    })
                });

                const data = await response.json();
                loadingMsg.remove();

                if (data.candidates && data.candidates.length > 0) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    appendMessage(aiText, 'ai-msg');
                } else {
                    appendMessage("ببورە، وەڵامێک نەهاتەوە لە سێرڤەرەوە.", 'ai-msg');
                }
            } catch (error) {
                console.error(error);
                loadingMsg.remove();
                appendMessage("ببورە، کێشەیەک ڕوویدا لە پەیوەندی کردن.", 'ai-msg');
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgDiv;
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
