<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ئای ڤیدیۆ - چاتی زیرەک</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Tahoma, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #1f1f1f;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid #333;
            font-size: 18px;
            font-weight: bold;
            color: #4da6ff;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
            font-size: 15px;
        }
        .user-message {
            background-color: #0078d4;
            color: #fff;
            align-self: flex-start;
            border-bottom-right-radius: 2px;
        }
        .bot-message {
            background-color: #252526;
            color: #e0e0e0;
            align-self: flex-end;
            border-bottom-left-radius: 2px;
            border: 1px solid #333;
        }
        #input-container {
            display: flex;
            padding: 15px;
            background-color: #1f1f1f;
            border-top: 1px solid #333;
            gap: 10px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        #user-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: #2d2d2d;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        #user-input:focus {
            border-color: #0078d4;
        }
        #send-btn {
            padding: 0 25px;
            background-color: #107c41;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: background 0.2s;
        }
        #send-btn:hover {
            background-color: #0b5a30;
        }
    </style>
</head>
<body>

    <header>زیرەکی دەستکردی تایبەت (AI Chat)</header>

    <div id="chat-container">
        <div class="message bot-message">سڵاو! من ئامادەم بۆ وەڵامدانی هەموو پرسیارەکانت. چۆن هاوکاریت بکەم؟</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="پەیامەکەت لێرە بنووسە..." autofocus>
        <button id="send-btn" onclick="sendMessage()">ناردن</button>
    </div>

    <script>
        // لێرەدا لۆژیکی پشتەوە (Backend Logic) و پێشەوە پێکەوە کار دەکەن
        const inputField = document.getElementById('user-input');
        const chatContainer = document.getElementById('chat-container');

        inputField.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });

        function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            // زیادکردنی پەیامی بەکارهێنەر بۆ شاشە
            appendMessage(text, 'user-message');
            inputField.value = '';

            // وەڵامدانەوەی زیرەکی دەستکرد (لێرەدا دەتوانیت لە داهاتوودا APIـی ڕاستەقینە ببەستیتەوە)
            setTimeout(() => {
                let botReply = generateAIResponse(text);
                appendMessage(botReply, 'bot-message');
            }, 500);
        }

        function appendMessage(text, className) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            messageDiv.innerText = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // سیستمی وەڵامدەرەوەی لۆژیکی ناوخۆیی
        function generateAIResponse(query) {
            query = query.toLowerCase();
            
            if (query.includes('سڵاو') || query.includes('هەلۆ')) {
                return 'سڵاو! چۆن دەتوانم لەم پڕۆژەیەدا یارمەتیت بدەم؟';
            } else if (query.includes('ناوت چییە')) {
                return 'من زیرەکی دەستکردی تایبەتی تۆم، کە لەسەر وێبسایتەکەت کار دەکەم.';
            } else if (query.includes('گیتەهوب') || query.includes('github')) {
                return 'بۆ بڵاوکردنەوەی ئەم فایلە لە گیتهوب، تەنها پێویستە ئەم فایلە پاشەکەوت بکەیت بە ناوی index.html و بینێریتە ناو ریپۆزیتۆرییەکەت!';
            } else {
                return `پەیامەکەت بە سەرکەووتوویی وەرگیرا: "${query}". من لێرەم بۆ جێبەجێکردنی داواکارییەکانت بەبێ سنور.`;
            }
        }
    </script>

</body>
</html>
