<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یاریدەدەری زیرەکی دەستکرد</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #chat-container {
            width: 100%;
            max-width: 600px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 80vh;
        }
        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }
        .user-msg {
            background-color: #007bff;
            color: white;
            align-self: flex-start;
            border-bottom-right-radius: 0;
        }
        .ai-msg {
            background-color: #e9ecef;
            color: #333;
            align-self: flex-end;
            border-bottom-left-radius: 0;
        }
        #input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #ddd;
            background: #fafafa;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }
        #user-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
        }
        #send-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            margin-right: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        #send-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-box">
            <div class="message ai-msg">سڵاو! من زیرەکی دەستکردم. چۆن دەتوانم یارمەتیت بدەم؟</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="پرسیارەکەت لێرە بنووسە..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">ناردن</button>
        </div>
    </div>

    <script>
        // لێرەدا دەبێت کۆدی API یەکەی خۆت دابنێیت
        const API_KEY = 'YOUR_GEMINI_API_KEY'; 

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            addMessage(message, 'user-msg');
            inputField.value = '';

            // نیشاندانی دەقی "بیردەکاتەوە..."
            const typingIndicator = addMessage('بیردەکاتەوە...', 'ai-msg');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: message }] }]
                    })
                });

                const data = await response.json();
                
                // سڕینەوەی کاتییەکە و دانانی وەڵامە ڕاستەقینەکە
                typingIndicator.remove();
                
                if (data.candidates && data.candidates.length > 0) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    addMessage(aiText, 'ai-msg');
                } else {
                    addMessage("ببورە، هەڵەیەک ڕوویدا لە وەڵامدانەوە.", 'ai-msg');
                }
            } catch (error) {
                typingIndicator.remove();
                addMessage("کێشەیەک هەیە لە هێڵی ئینتەرنێت یان API.", 'ai-msg');
            }
        }

        function addMessage(text, className) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgDiv;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
