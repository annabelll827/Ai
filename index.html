<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زیرەکی دەستکرد - AI Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col justify-between">

    <header class="bg-gray-900 border-b border-gray-800 p-4 flex items-center justify-between shadow-md">
        <div class="flex items-center space-x-3 space-x-reverse">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-brain text-white text-lg"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg text-white">ئای ئای مۆدێرن</h1>
                <p class="text-xs text-emerald-400 flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> ئامادەیە بۆ وەڵامدانەوە
                </p>
            </div>
        </div>
        <div class="text-gray-400 text-sm bg-gray-800 px-3 py-1.5 rounded-lg border border-gray-700">
            <i class="fa-solid fa-bolt text-amber-400 ml-1"></i> Gemini API
        </div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 max-w-4xl w-full mx-auto">
        <div class="flex items-start space-x-3 space-x-reverse">
            <div class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center text-white shrink-0 shadow-md">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div class="bg-gray-900 border border-gray-800 p-4 rounded-2xl rounded-tr-none max-w-[85%] md:max-w-xl text-sm leading-relaxed shadow-sm">
                سڵاو! من ئامادەم. پرسیارەکەت بنووسە تاوەکو وەڵامت بدەمەوە.
            </div>
        </div>
    </main>

    <footer class="bg-gray-950 border-t border-gray-800 p-4">
        <form id="chat-form" class="max-w-4xl mx-auto flex items-center gap-3">
            <div class="relative flex-1">
                <input type="text" id="user-input" placeholder="لێرە پرسیارەکەت بنووسە..." 
                    class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-3.5 pr-4 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all shadow-inner">
            </div>
            <button type="submit" id="send-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white w-12 h-12 rounded-xl flex items-center justify-center transition-all shadow-lg shrink-0 cursor-pointer">
                <i class="fa-solid fa-arrow-up"></i>
            </button>
        </form>
    </footer>

    <script>
        const API_KEY = 'AQ.Ab8RN6Jq46jXOox4K1SGjig1aXSTWBFQYRsXe3CwS2JKz8jUoQ'; 

        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');

        chatForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';

            const loadingId = showLoading();

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: text }]
                        }]
                    })
                });

                const data = await response.json();
                removeLoading(loadingId);

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    appendMessage(aiReply, 'ai');
                } else {
                    appendMessage("ببوورە، هەڵەیەک ڕوودا لە وەرگرتنی وەڵام.", 'ai');
                }

            } catch (error) {
                removeLoading(loadingId);
                appendMessage("تکایە پشکنین بۆ هێڵی ئینتەرنێت بکە.", 'ai');
            }
        });

        function appendMessage(text, sender) {
            const isUser = sender === 'user';
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex items-start space-x-3 space-x-reverse ${isUser ? 'flex-row-reverse space-x-reverse' : ''}`;
            
            messageDiv.innerHTML = `
                <div class="w-9 h-9 rounded-xl ${isUser ? 'bg-purple-600' : 'bg-indigo-600'} flex items-center justify-center text-white shrink-0 shadow-md">
                    <i class="fa-solid ${isUser ? 'fa-user' : 'fa-robot'}"></i>
                </div>
                <div class="${isUser ? 'bg-indigo-950 border-indigo-900/50' : 'bg-gray-900 border-gray-800'} border p-4 rounded-2xl ${isUser ? 'rounded-tl-none' : 'rounded-tr-none'} max-w-[85%] md:max-w-xl text-sm leading-relaxed shadow-sm whitespace-pre-wrap">
                    ${escapeHtml(text)}
                </div>
            `;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showLoading() {
            const id = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = id;
            loadingDiv.className = `flex items-start space-x-3 space-x-reverse`;
            loadingDiv.innerHTML = `
                <div class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center text-white shrink-0 shadow-md">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div class="bg-gray-900 border border-gray-800 p-4 rounded-2xl rounded-tr-none text-sm text-gray-400 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-indigo-500 animate-bounce"></span>
                    <span class="w-2 h-2 rounded-full bg-indigo-500 animate-bounce [animation-delay:0.2s]"></span>
                    <span class="w-2 h-2 rounded-full bg-indigo-500 animate-bounce [animation-delay:0.4s]"></span>
                </div>
            `;
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        function removeLoading(id) {
            const element = document.getElementById(id);
            if (element) element.remove();
        }

        function escapeHtml(string) {
            return string.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
    </script>
</body>
</html>
