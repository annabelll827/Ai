<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ئای ڤیدیۆ - چاتی زیرەکی بێسنوور</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Tahoma, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #1f1f1f;
            padding: 12px 20px;
            text-align: center;
            border-bottom: 1px solid #333;
            font-size: 16px;
            font-weight: bold;
            color: #4da6ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #api-section {
            font-size: 13px;
        }
        #api-section input {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #444;
            background-color: #2d2d2d;
            color: #fff;
            width: 200px;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.8;
            word-wrap: break-word;
            font-size: 15px;
            white-space: pre-line;
        }
        .user-message {
            background-color: #0078d4;
            color: #fff;
            align-self: flex-start;
            border-bottom-right-radius: 2px;
        }
        .bot-message {
            background-color: #252526;
            color: #e0e0e0;
            align-self: flex-end;
            border-bottom-left-radius: 2px;
            border: 1px solid #333;
        }
        #input-container {
            display: flex;
            padding: 15px;
            background-color: #1f1f1f;
            border-top: 1px solid #333;
            gap: 10px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        #user-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: #2d2d2d;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        #user-input:focus { border-color: #0078d4; }
        #send-btn {
            padding: 0 25px;
            background-color: #107c41;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
        }
        #send-btn:hover { background-color: #0b5a30; }
    </style>
</head>
<body>

    <header>
        <span>زیرەکی دەستکردی تایبەت</span>
        <div id="api-section">
            <input type="password" id="api-key-input" placeholder="کلیلی API لێرە بنووسە (ئیختیاری)">
        </div>
    </header>

    <div id="chat-container">
        <div class="message bot-message">سڵاو! من ئامادەم بۆ جێبەجێکردنی داواکارییەکانت، لەوانە دۆزینەوەی لینکەکان، ڕێنمایی پڕۆژەکان و وەڵامدانەوەی پرسیارەکانت. فەرموو دەست پێبکە!</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="پەیامەکەت لێرە بنووسە (بۆ نموونە: چۆن لینکەکانی m3u8 بدۆزمەوە؟)..." autofocus>
        <button id="send-btn">ناردن</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const inputField = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            const chatContainer = document.getElementById('chat-container');

            // کارکردنی دوگمەی ناردن بە کلییک کردن
            sendBtn.addEventListener('click', function() {
                sendMessage();
            });

            // کارکردنی دوگمەی ناردن بە دابگرتنی کلیلی Enter لە سەرتەختە
            inputField.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    sendMessage();
                }
            });

            async function sendMessage() {
                const text = inputField.value.trim();
                const apiKey = document.getElementById('api-key-input').value.trim();
                if (!text) return;

                appendMessage(text, 'user-message');
                inputField.value = '';

                // ئەگەر بەکارهێنەر کلیلی APIـی دابین کردبێت
                if (apiKey) {
                    try {
                        const response = await fetch('https://api.openai.com/v1/chat/completions', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${apiKey}`
                            },
                            body: JSON.stringify({
                                model: "gpt-3.5-turbo",
                                messages: [{ role: "user", content: text }]
                            })
                        });
                        const data = await response.json();
                        if (data.choices && data.choices.length > 0) {
                            appendMessage(data.choices[0].message.content, 'bot-message');
                            return;
                        }
                    } catch (error) {
                        console.error("هەڵە لە پەیوەندی API:", error);
                    }
                }

                // سیستمی ناوخۆیی زیرەک
                setTimeout(() => {
                    let botReply = getSmartResponse(text);
                    appendMessage(botReply, 'bot-message');
                }, 500);
            }

            function appendMessage(text, className) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${className}`;
                messageDiv.innerText = text;
                chatContainer.appendChild(messageDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            function getSmartResponse(query) {
                let q = query.toLowerCase();

                if (q.includes('m3u8') || q.includes('لینک') || q.includes('ستریمینگ')) {
                    return `بۆ دۆزینەوەی لینکەکانی m3u8 و بەڕێوەبردنی پڕۆژەکەی ستریمینگ، دەتوانیت ئەم هەنگاوانە جێبەجێ بکەیت:

1. **بەکارهێنانی ئامرازەکانی پشکنین (Network Inspector):** 
   - لە وێبگەڕەکەی کۆمپیوتەرەکەتدا، کاتێک سەیری ڤیدیۆیەک دەکەیت، دوگمەی F12 یان Inspect بکەرەوە.
   - بچۆ بەشی **Network** و فلتەری بکە لەسەر **Fetch/XHR** یان بنووسە `m3u8`.
   - ئەو لینکەی کە فایلی تێدایە کۆپی بکە و لە پڕۆژەکەتدا بەکاری بهێنە.

2. **بەکارهێنانی بەرنامەی دەرەکی:**
   - ئەگەر لەسەر مۆبایل کار دەکەیت، بەرنامەکانی وەک **Http Catcher** یان **Sniffer** بەکاربهێنە بۆ گرنتیکردنی پاکێجەکانی تۆڕ و دۆزینەوەی ناونیشانی ڕاستەقینەی ڤیدیۆکە.`;
                } else {
                    return `سەبارەت به داواکارییەکەت ("${query}"):
من وەک زیرەکی دەستکردی پڕۆژەکەت ئامادەم بۆ هاوکاریکردنت. دەتوانیت لە سەرەوە کلیلی APIـی خۆت دابنێیت بۆ ئەوەی ڕاستەوخۆ وەڵامی بێسنووری مۆدێلە جیهانییەکانت پێ بداتەوە، یان پرسیارەکانت لە بارەی پڕۆگرامسازی، وێبسایت و لینکەکانەوە ئاراستە بکەیت تا بە وردی بۆت شی بکەمەوە.`;
                }
            }
        });
    </script>

</body>
</html>
