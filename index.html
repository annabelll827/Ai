<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Callvin AI</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="sidebar">

    <div class="logo">
        <h2>🤖 Callvin AI</h2>
    </div>

    <button id="newChat">
        + چاتی نوێ
    </button>

    <div class="history" id="history">
    </div>

</div>

<div class="main">

<header>

<h3>Callvin AI</h3>

<div class="header-buttons">

<button id="darkMode">
🌙
</button>

<select id="language">

<option value="ku">کوردی</option>

<option value="ar">العربية</option>

<option value="en">English</option>

</select>

</div>

</header>

<div class="chat-area" id="chatArea">

<div class="welcome">

<h1>👋 بەخێربێیت بۆ Callvin AI</h1>

<p>پرسیارەکانت بنووسە.</p>

</div>

</div>

<div class="input-area">

<textarea
id="userInput"
placeholder="نامەکەت بنووسە..."
rows="1">
</textarea>

<button id="sendBtn">
➤
</button>

</div>

</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
